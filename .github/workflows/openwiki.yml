name: Update OpenWiki

on:
  workflow_dispatch:   # 수동 실행 시 secrets 전달 가능

jobs:
  update-openwiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
