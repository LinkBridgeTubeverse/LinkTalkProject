jobs:
  update-openwiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r LinkTalkProject/requirements.txt   # 경로 수정!

      - name: Run OpenWiki
        run: python LinkTalkProject/main.py                 # main.py도 폴더 안에 있으니 경로 수정!
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
